<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bài tập nâng cao</title>
</head>
<body>
    <script>
        let n;
        let sum = 0;
        do{
            n = parseInt(prompt("Mời bạn nhập số lượng phần tử mảng: "));
        }while (n<0 || isNaN(n))
        let numbers = [];
        for(let i = 0;i<n;i++){
            numbers.push(parseInt(prompt(`Mời bạn nhập phần tử thứ ${i+1}: `)));
        }
        // in mảng cho truc quan
        console.log("Mảng vừa nhập là: ")
        for(let num of numbers){
            console.log(num);
        }
        console.log("Các số nguyên tố trong mảng là: ")
        for(let number of numbers){
            if(isPrime(number)){
                console.log(number);
                sum+=number;
            }

        }
        console.log(`Tổng số nguyên tố trong mảng là: ${sum}`);
        function isPrime(n){
            if(n<2) return false;
            if(n==2) return true;
            if(n%2==0) return false;
            for(let i=3;i*i<=n;i++){
                if(n % i == 0) return false;
            }
            return true;
        }
    </script>
</body>
</html>
